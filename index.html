// ══ PWA REGISTRATION + NOTIFICATIONS ════════════════════════════════════════
function usePWA(data,toast){
  const [installPrompt,setInstallPrompt]=useState(null);
  const [installed,setInstalled]=useState(false);
  const [notifStatus,setNotifStatus]=useState(typeof Notification!=="undefined"?Notification.permission:"unsupported");

  // Register service worker
  useEffect(()=>{
    if(!("serviceWorker" in navigator))return;
    navigator.serviceWorker.register("/sw.js").then(reg=>{
      console.log("[LifeSync] SW registered",reg.scope);
    }).catch(e=>console.warn("[LifeSync] SW failed",e));
  },[]);

  // Catch install prompt (Chrome/Edge/Android)
  useEffect(()=>{
    const handler=e=>{e.preventDefault();setInstallPrompt(e);};
    window.addEventListener("beforeinstallprompt",handler);
    window.addEventListener("appinstalled",()=>setInstalled(true));
    // Check if already installed
    if(window.matchMedia("(display-mode: standalone)").matches)setInstalled(true);
    return()=>window.removeEventListener("beforeinstallprompt",handler);
  },[]);

  // Schedule local reminder notifications
  useEffect(()=>{
    if(notifStatus!=="granted")return;
    const timers=[];

    // 8pm habit reminder — only if habits not all done
    const scheduleHabitReminder=()=>{
      const now=new Date();
      const target=new Date(now);
      target.setHours(20,0,0,0);
      if(target<=now)target.setDate(target.getDate()+1);
      const ms=target-now;
      timers.push(setTimeout(()=>{
        const done=data.habits.filter(h=>h.doneToday).length;
        const total=data.habits.length;
        if(done<total){
          new Notification("LifeSync ✨",{
            body:`${total-done} habit${total-done>1?"s":""} left today — don't break your streak! 🔥`,
            icon:"/icon-192.png",tag:"habits",
          });
        }
        scheduleHabitReminder(); // reschedule for tomorrow
      },ms));
    };

    // Water reminder every 2 hours during waking hours (8am–10pm)
    const scheduleWaterReminder=()=>{
      const now=new Date();
      const h=now.getHours();
      if(h>=8&&h<22){
        const water=data.nutrition?.water?.current||0;
        const goal=data.settings?.waterGoal||8;
        if(water<goal){
          timers.push(setTimeout(()=>{
            new Notification("💧 Water time!",{
              body:`${water} of ${goal} cups logged. Stay hydrated! `,
              icon:"/icon-192.png",tag:"water",
            });
            scheduleWaterReminder();
          },2*60*60*1000));
        }
      }
    };

    // Bill due-soon alert — check once on load
    const billsDueSoon=(data.budget?.bills||[]).filter(b=>{
      if(b.paid)return false;
      const today=new Date().getDate();
      return b.dueDay>=today&&b.dueDay<=today+3;
    });
    if(billsDueSoon.length>0){
      setTimeout(()=>{
        new Notification("💰 Bills due soon",{
          body:billsDueSoon.map(b=>`${b.emoji} ${b.name} — $${b.amount} due ${b.dueDay}th`).join("\n"),
          icon:"/icon-192.png",tag:"bills",
        });
      },3000);
    }

    scheduleHabitReminder();
    scheduleWaterReminder();
    return()=>timers.forEach(clearTimeout);
  },[notifStatus,data.habits,data.nutrition,data.settings,data.budget]);

  const requestNotifs=async()=>{
    if(typeof Notification==="undefined")return;
    const result=await Notification.requestPermission();
    setNotifStatus(result);
    if(result==="granted")toast("Notifications enabled! 🔔","success");
  };

  const install=async()=>{
    if(!installPrompt)return;
    installPrompt.prompt();
    const{outcome}=await installPrompt.userChoice;
    if(outcome==="accepted"){setInstalled(true);toast("LifeSync installed! 🎉","success");}
    setInstallPrompt(null);
  };

  return{installed,installPrompt,notifStatus,requestNotifs,install};
}

// ══ ZEPP SYNC HOOK ═══════════════════════════════════════════════════════════
// Polls localStorage for the zepp_last_sync key that the Zepp Side Service
// writes after each BLE sync. When new data arrives, merges it into LifeSync.
function useZeppSync(setData,toast){
  const [syncState,setSyncState]=useState(()=>{
    try{const s=localStorage.getItem("zepp_last_sync");return s?JSON.parse(s):null;}catch{return null;}
  });

  // Poll every 5s — only updates syncState (pure, no side effects)
  useEffect(()=>{
    const interval=setInterval(()=>{
      try{
        const raw=localStorage.getItem("zepp_last_sync");
        if(!raw)return;
        const parsed=JSON.parse(raw);
        setSyncState(prev=>{
          if(!prev||parsed.timestamp>prev.timestamp)return parsed;
          return prev;
        });
      }catch{}
    },5000);
    return()=>clearInterval(interval);
  },[]);

  // React to new syncState — pull merged data from localStorage into app state
  const prevTsRef=useRef(0);
  useEffect(()=>{
    if(!syncState)return;
    if(syncState.timestamp<=prevTsRef.current)return;
    prevTsRef.current=syncState.timestamp;
    try{
      const fullRaw=localStorage.getItem("lifesync-v6");
      if(!fullRaw)return;
      const fresh=JSON.parse(fullRaw);
      if(!fresh.zeppSync)return;
      setData(d=>({...d,
        zeppSync:fresh.zeppSync,
        sleep:fresh.sleep||d.sleep,
        habits:fresh.habits||d.habits,
      }));
      toast(`⌚ Amazfit synced · ${syncState.summary?.steps?.toLocaleString()||"—"} steps · ${syncState.summary?.sleepHours||"—"}h sleep`,"success");
    }catch{}
  },[syncState,setData,toast]);

  return syncState;
}

function Ring({value,max,size=80,stroke=6,color="var(--violet)",label,sub}){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r,pct=Math.min((value/max)*100,100),off=circ-(pct/100)*circ;
  return(
    <div className="ring-wrap" style={{width:size,height:size}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface2)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 0.9s ease"}}/>
      </svg>
      {(label||sub)&&(
        <div className="ring-label">
          {label&&<div style={{fontSize:size/4.8,fontWeight:700,lineHeight:1}}>{label}</div>}
          {sub&&<div style={{fontSize:size/7.5,color:"var(--text-muted)",lineHeight:1.3,marginTop:1}}>{sub}</div>}
        </div>
      )}
    </div>
  );
}

const XP_PER_LEVEL=lvl=>lvl*250;
function calcLevel(xp){
  let lvl=1,rem=xp;
  while(rem>=XP_PER_LEVEL(lvl)){rem-=XP_PER_LEVEL(lvl);lvl++;}
  return{level:lvl,xpInLevel:rem,xpNeeded:XP_PER_LEVEL(lvl)};
}

function getCyclePhase(lastStart,cycleLen){
  const yr=new Date().getFullYear();const start=new Date(lastStart+", "+yr);
  const day=Math.floor((Date.now()-start.getTime())/86400000)+1;
  const d=((day-1)%cycleLen)+1;
  if(d<=5)return{phase:"Menstrual",color:"var(--rose)",day:d,emoji:"🌸",advice:"Rest & gentle movement. Iron-rich foods."};
  if(d<=13)return{phase:"Follicular",color:"var(--mint)",day:d,emoji:"🌱",advice:"Energy rising! Great for strength training."};
  if(d<=16)return{phase:"Ovulation",color:"var(--gold)",day:d,emoji:"⭐",advice:"Peak energy & confidence — HIIT time!"};
  return{phase:"Luteal",color:"var(--violet)",day:d,emoji:"🌙",advice:"Ease up, prioritize sleep & magnesium."};
}

function WaterCups({current,goal,onAdd}){
  const [splash,setSplash]=useState(-1);
  const tap=i=>{if(i>=current){setSplash(i);setTimeout(()=>setSplash(-1),380);onAdd(i+1);}};
  return(
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
      {Array.from({length:goal}).map((_,i)=>(
        <div key={i} className={`cup ${i<current?"filled":""} ${i===splash?"splash":""}`} onClick={()=>tap(i)} title={i<current?"Logged":"Click to log"}>
          <div className="cup-fill" style={{height:i<current?"100%":"0%"}}/>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:13,zIndex:1}}>{i<current?"💧":""}</div>
        </div>
      ))}
    </div>
  );
}

  const toggle=h=>{
    setData(d=>({...d,habits:d.habits.map(x=>x.id===h.id?{...x,doneToday:!x.doneToday,streak:!x.doneToday?x.streak+1:Math.max(0,x.streak-1)}:x),user:!h.doneToday?{...d.user,xp:d.user.xp+25}:d.user,streaks:!h.doneToday?{...d.streaks,habits:d.streaks.habits+1}:d.streaks}));

  const add=()=>{
    if(!nh.name.trim())return;
    setData(d=>({...d,habits:[...d.habits,{id:Date.now(),...nh,streak:0,doneToday:false,current:0}]}));
    toast("New habit added! 🌟");setShowAdd(false);setNh({name:"",icon:"⭐",category:"Health",isNumeric:false,target:1});
  };

  return(
    <div className="pe">

    </div>

}

function NutritionPage({data,setData,toast}){
  const [showAdd,setShowAdd]=useState(false);
  const [search,setSearch]=useState("");
  const [searching,setSearching]=useState(false);
  const [results,setResults]=useState([]);
  const [nf,setNf]=useState({name:"",emoji:"🍽️",cal:"",protein:"",carbs:"",fat:""});
  const n=data.nutrition;

  const searchFood=async()=>{
    if(!search.trim())return;
    setSearching(true);setResults([]);
    try{
      const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(search)}&json=1&fields=product_name,nutriments&page_size=6`,{signal:ctrl.signal});
      clearTimeout(tid);
      const d=await r.json();
      setResults((d.products||[]).filter(p=>p.product_name&&p.nutriments).slice(0,6));
    }catch{toast("Food database offline — enter manually","error");}
    setSearching(false);
  };

  const pickResult=p=>{
    const nm=p.nutriments;
    setNf({name:p.product_name,emoji:"🍽️",cal:Math.round(nm["energy-kcal_100g"]||nm["energy-kcal"]||0),protein:Math.round(nm.proteins_100g||0),carbs:Math.round(nm.carbohydrates_100g||0),fat:Math.round(nm.fat_100g||0)});
    setResults([]);setSearch("");
  };

  const add=()=>{
    if(!nf.name.trim()||nf.cal==="")return;
    const cal=+nf.cal,protein=+nf.protein||0,carbs=+nf.carbs||0,fat=+nf.fat||0;
    setData(d=>({...d,nutrition:{...d.nutrition,calories:{...d.nutrition.calories,current:d.nutrition.calories.current+cal},protein:{...d.nutrition.protein,current:d.nutrition.protein.current+protein},carbs:{...d.nutrition.carbs,current:d.nutrition.carbs.current+carbs},fat:{...d.nutrition.fat,current:d.nutrition.fat.current+fat},logs:[{id:Date.now(),name:nf.name,emoji:nf.emoji,cal,protein,carbs,fat,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})},...d.nutrition.logs]},user:{...d.user,xp:d.user.xp+10}}));
    toast(`+10 XP · ${nf.name} logged 🍴`,"xp");
    setShowAdd(false);setNf({name:"",emoji:"🍽️",cal:"",protein:"",carbs:"",fat:""});
  };

  const del=id=>setData(d=>{
    const log=d.nutrition.logs.find(l=>l.id===id);if(!log)return d;
    return{...d,nutrition:{...d.nutrition,calories:{...d.nutrition.calories,current:Math.max(0,d.nutrition.calories.current-log.cal)},protein:{...d.nutrition.protein,current:Math.max(0,d.nutrition.protein.current-log.protein)},carbs:{...d.nutrition.carbs,current:Math.max(0,d.nutrition.carbs.current-log.carbs)},fat:{...d.nutrition.fat,current:Math.max(0,d.nutrition.fat.current-log.fat)},logs:d.nutrition.logs.filter(l=>l.id!==id)}};
  });

  return(
    <div className="pe">
      <div className="flex fac fjb sh">
        <div><h2 className="st">Nutrition 🥗</h2><p className="ss2">Track macros & calories</p></div>
        <button className="btn btn-p" onClick={()=>setShowAdd(true)}><Ic n="plus" size={15} color="#fff"/>Log Food</button>
      </div>
      <div className="card gr sp">
        <div style={{display:"flex",justifyContent:"space-around",flexWrap:"wrap",gap:14,padding:"6px 0"}}>
          {[{v:n.calories.current,max:data.settings.calorieGoal,label:"Cals",sub:`/${data.settings.calorieGoal}`,color:"var(--peach)",size:106},{v:n.protein.current,max:data.settings.proteinGoal,label:"Protein",sub:`${n.protein.current}g`,color:"var(--rose)",size:88},{v:n.carbs.current,max:data.settings.carbsGoal,label:"Carbs",sub:`${n.carbs.current}g`,color:"var(--indigo)",size:88},{v:n.fat.current,max:data.settings.fatGoal,label:"Fat",sub:`${n.fat.current}g`,color:"var(--violet)",size:88}].map((m,i)=>(
            <div key={i} style={{textAlign:"center"}}><Ring value={m.v} max={m.max} size={m.size} color={m.color} label={i===0?m.v:m.sub} sub={m.label}/></div>
          ))}
        </div>
      </div>
      <div className="card sp">
        <div style={{fontWeight:700,fontSize:13.5,marginBottom:14}}>Weekly Calories</div>
        <BarChart data={n.weekData} color="var(--peach)" height={75} labels={WEEK_LABELS}/>
      </div>
      <div className="card">
        <div style={{fontWeight:700,fontSize:13.5,marginBottom:13}}>Today's Food Log</div>
        {n.logs.length===0&&<div style={{textAlign:"center",padding:30,color:"var(--text-muted)",fontSize:13}}>No food logged yet 🥗</div>}
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {n.logs.map(log=>(
            <div key={log.id} style={{display:"flex",alignItems:"center",gap:11,padding:"11px 13px",background:"var(--surface2)",borderRadius:13,border:"1px solid var(--border)"}}>
              <span style={{fontSize:22}}>{log.emoji}</span>
              <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{log.name}</div><div style={{fontSize:10.5,color:"var(--text-muted)"}}>{log.time}</div></div>
              <span className="b bp">{log.cal} kcal</span>
              <span className="b br">{log.protein}g P</span>
              <button className="btn btn-g btn-ic" style={{width:26,height:26,fontSize:15,color:"var(--text-dim)"}} onClick={()=>del(log.id)}>×</button>
            </div>
          ))}
        </div>
      </div>
      <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="Log Food 🍴">
        <div style={{marginBottom:16}}>
          <label className="label">Search Food Database (3M+ items, free)</label>
          <div style={{display:"flex",gap:8}}>
            <input className="inp" placeholder="e.g. Greek yogurt, banana..." value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchFood()}/>
            <button className="btn btn-s" onClick={searchFood} style={{flexShrink:0}}>{searching?"...":"Search"}</button>
          </div>
          {results.length>0&&(
            <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:6,maxHeight:200,overflowY:"auto"}}>
              {results.map((r,i)=>(
                <div key={i} style={{padding:"9px 12px",background:"var(--surface2)",borderRadius:10,cursor:"pointer",border:"1px solid var(--border)",fontSize:12.5}} onClick={()=>pickResult(r)} onMouseEnter={e=>e.currentTarget.style.borderColor="var(--violet)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
                  <div style={{fontWeight:600}}>{r.product_name}</div>
                  <div style={{color:"var(--text-muted)",fontSize:11}}>{Math.round(r.nutriments?.["energy-kcal_100g"]||0)} kcal · {Math.round(r.nutriments?.proteins_100g||0)}g P per 100g</div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{height:1,background:"var(--border)",margin:"12px 0"}}/>
        <div style={{fontSize:12,color:"var(--text-muted)",marginBottom:12}}>Or enter manually:</div>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <div style={{display:"flex",gap:9}}>
            <Field label="Emoji" style={{width:58}}><input className="inp" value={nf.emoji} onChange={e=>setNf(f=>({...f,emoji:e.target.value}))} style={{textAlign:"center",fontSize:20,padding:"8px 4px"}}/></Field>
            <Field label="Food Name" style={{flex:1}}><input className="inp" placeholder="Avocado toast" value={nf.name} onChange={e=>setNf(f=>({...f,name:e.target.value}))}/></Field>
          </div>
          <div className="g2">
            {[["cal","Calories (kcal)"],["protein","Protein (g)"],["carbs","Carbs (g)"],["fat","Fat (g)"]].map(([k,lbl])=>(
              <Field key={k} label={lbl}><input className="inp" type="number" placeholder="0" value={nf[k]} onChange={e=>setNf(f=>({...f,[k]:e.target.value}))}/></Field>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:9,marginTop:18}}>
          <button className="btn btn-g w100" onClick={()=>setShowAdd(false)}>Cancel</button>
          <button className="btn btn-p w100" onClick={add}>Log Food 🍽️</button>
        </div>
      </Modal>
    </div>
  );
}

function SleepPage({data,setData,toast}){
  const [showAdd,setShowAdd]=useState(false);
  const [ns,setNs]=useState({bedtime:"11:00 PM",wake:"7:00 AM",quality:4,notes:""});
  const logs=data.sleep.logs;
  const avgHours=(logs.slice(0,7).reduce((s,l)=>s+l.hours,0)/Math.min(logs.length,7)).toFixed(1);
  const qualityColor=q=>q>=4?"var(--mint)":q>=3?"var(--gold)":q>=2?"var(--peach)":"var(--rose)";
  const calcHours=(bed,wake)=>{
    const p=t=>{const[h,m]=t.replace(/(AM|PM)/,"").trim().split(":").map(Number);return(t.includes("PM")&&h!==12?h+12:h===12&&t.includes("AM")?0:h)*60+m;};
    let diff=p(wake)-p(bed);if(diff<0)diff+=1440;return+(diff/60).toFixed(1);
  };
  const add=()=>{
    const hours=calcHours(ns.bedtime,ns.wake);
    const log={id:Date.now(),date:TODAY(),bedtime:ns.bedtime,wake:ns.wake,hours,quality:ns.quality,notes:ns.notes};
    setData(d=>({...d,sleep:{...d.sleep,logs:[log,...d.sleep.logs]},user:{...d.user,xp:d.user.xp+20},streaks:{...d.streaks,sleep:hours>=d.sleep.goalHours?(d.streaks.sleep||0)+1:0}}));
    toast(`+20 XP · ${hours}h sleep logged 😴`,"xp");
    setShowAdd(false);setNs({bedtime:"11:00 PM",wake:"7:00 AM",quality:4,notes:""});
  };
  return(
    <div className="pe">
      <div className="flex fac fjb sh">
        <div><h2 className="st">Sleep 😴</h2><p className="ss2">Avg {avgHours}h · Goal {data.sleep.goalHours}h · 🔥 {data.streaks.sleep} streak</p></div>
        <button className="btn btn-p" onClick={()=>setShowAdd(true)}><Ic n="plus" size={15} color="#fff"/>Log Sleep</button>

        {[{label:"Avg Hours",val:avgHours+"h",color:"var(--sky)",icon:"😴",sub:`Goal: ${data.sleep.goalHours}h`},{label:"Avg Quality",val:(logs.slice(0,7).reduce((s,l)=>s+l.quality,0)/Math.min(logs.length,7)).toFixed(1)+"/5",color:"var(--violet)",icon:"⭐",sub:"sleep quality"},{label:"Streak",val:data.streaks.sleep+"d",color:"var(--gold)",icon:"🔥",sub:"consecutive nights"}].map((s,i)=>(
          <div key={i} className="sc"><div className="si" style={{background:`${s.color}18`}}>{s.icon}</div><div className="sv" style={{color:s.color}}>{s.val}</div><div className="sl">{s.label}</div><div className="ss">{s.sub}</div></div>
        ))}
      </div>
      <div className="card sp">
        <div style={{fontWeight:700,fontSize:13.5,marginBottom:14}}>7-Day Sleep Hours</div>
        <BarChart data={[...logs].reverse().slice(0,7).map(l=>l.hours)} color="var(--sky)" height={75} labels={[...logs].reverse().slice(0,7).map(l=>l.date.slice(-2))}/>
      </div>
      <div className="card">
        <div style={{fontWeight:700,fontSize:13.5,marginBottom:13}}>Sleep Log</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {logs.map(log=>(
            <div key={log.id} style={{padding:"13px 15px",background:"var(--surface2)",borderRadius:14,border:"1px solid var(--border)"}}>
              <div className="flex fac fjb" style={{marginBottom:6}}><span style={{fontWeight:700,fontSize:13.5}}>{log.date}</span><div className="flex fac gap2"><span className="b bs">{log.hours}h</span><span className="b" style={{background:`${qualityColor(log.quality)}18`,color:qualityColor(log.quality)}}>{log.quality}/5 ⭐</span></div></div>
              <div style={{fontSize:11.5,color:"var(--text-muted)"}}>🌙 {log.bedtime} → ☀️ {log.wake}</div>
              {log.notes&&<div style={{fontSize:11.5,color:"var(--text-dim)",marginTop:4,fontStyle:"italic"}}>{log.notes}</div>}

  const [tab,setTab]=useState("overview");

  const [nb,setNb]=useState({name:"",amount:"",dueDay:"",emoji:"📄",autoPay:false});
  const b=data.budget;
  const computedCats=b.categories.map(c=>({...c,spent:+catSpent(b.transactions,c.name).toFixed(2)}));
  const totalSpent=b.transactions.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
  const totalIncome=b.transactions.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const saved=totalIncome-totalSpent;
  const savePct=totalIncome>0?Math.round((saved/totalIncome)*100):0;
  const networth=b.assets.reduce((s,a)=>s+a.amount,0)-b.liabilities.reduce((s,l)=>s+l.amount,0);
  const allCats=["All","Income",...b.categories.map(c=>c.name)];
  const filteredTx=filterCat==="All"?b.transactions:b.transactions.filter(t=>t.category===filterCat);

  const addTx=()=>{
    if(!nt.name.trim()||!nt.amount)return;
    const amt=nt.type==="income"?+Math.abs(+nt.amount):-Math.abs(+nt.amount);
    const tx={id:Date.now(),date:TODAY(),name:nt.name,amount:amt,category:nt.type==="income"?"Income":nt.category,emoji:nt.emoji,note:nt.note};
    setData(d=>({...d,budget:{...d.budget,transactions:[tx,...d.budget.transactions]}}));
    toast(nt.type==="income"?`+$${Math.abs(amt).toFixed(2)} income logged 💚`:`-$${Math.abs(amt).toFixed(2)} logged`);
    setShowAddTx(false);setNt({name:"",amount:"",category:"Groceries",emoji:"💸",note:"",type:"expense"});
  };

  const addBill=()=>{
    if(!nb.name.trim()||!nb.amount||!nb.dueDay)return;
    setData(d=>({...d,budget:{...d.budget,bills:[...d.budget.bills,{id:Date.now(),name:nb.name,amount:+nb.amount,dueDay:+nb.dueDay,emoji:nb.emoji,paid:false,autoPay:nb.autoPay}]}}));
    toast(`Bill "${nb.name}" added!`);setShowAddBill(false);setNb({name:"",amount:"",dueDay:"",emoji:"📄",autoPay:false});
  };

  const toggleBillPaid=id=>setData(d=>({...d,budget:{...d.budget,bills:d.budget.bills.map(bl=>bl.id===id?{...bl,paid:!bl.paid}:bl)}}));
  const delTx=id=>setData(d=>({...d,budget:{...d.budget,transactions:d.budget.transactions.filter(t=>t.id!==id)}}));

  const exportCSV=()=>{
    const rows=[["Date","Description","Amount","Category","Note"],...b.transactions.map(t=>[t.date,`"${t.name}"`,t.amount,t.category,t.note||""])];
    const csv=rows.map(r=>r.join(",")).join("\n");
    const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    const a=document.createElement("a");a.href=url;a.download="lifesync-finance.csv";a.click();
    toast("Finance CSV exported! 📊");
  };

  return(
    <div className="pe">
      <div className="flex fac fjb sh" style={{flexWrap:"wrap",gap:10}}>
        <div><h2 className="st">Finance 💰</h2><p className="ss2">{savePct}% saved · {computedCats.filter(c=>c.spent>c.budget).length} over budget</p></div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn btn-s btn-sm" onClick={exportCSV}><Ic n="download" size={13}/>CSV</button>
          <button className="btn btn-p btn-sm" onClick={()=>setShowAddBill(true)}>+ Bill</button>
          <button className="btn btn-p" onClick={()=>setShowAddTx(true)}><Ic n="plus" size={15} color="#fff"/>Add Transaction</button>
        </div>
      </div>
      <div className="tabs sp">{["overview","transactions","budgets","bills","networth"].map(t=><div key={t} className={`tab ${tab===t?"active":""}`} onClick={()=>setTab(t)} style={{textTransform:"capitalize"}}>{t}</div>)}</div>

      {tab==="overview"&&(
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          <div className="g3">
            {[{icon:"💵",val:`$${totalIncome.toLocaleString()}`,label:"Income",color:"var(--mint)",sub:`${b.incomeSources.length} sources`},{icon:"💸",val:`$${totalSpent.toFixed(0)}`,label:"Spent",color:"var(--rose)",sub:`${Math.round((totalSpent/totalIncome)*100)}% of income`},{icon:"🏦",val:`$${saved.toFixed(0)}`,label:"Saved",color:saved>=b.savingsGoal?"var(--gold)":"var(--text)",sub:saved>=b.savingsGoal?"Goal reached! 🎉":`$${(b.savingsGoal-saved).toFixed(0)} to go`}].map((s,i)=>(
              <div key={i} className="sc"><div className="si" style={{background:`${s.color}18`}}>{s.icon}</div><div className="sv" style={{color:s.color}}>{s.val}</div><div className="sl">{s.label}</div><div className="ss">{s.sub}</div></div>
            ))}
          </div>
          <div className="card gg flex fac gap4" style={{flexWrap:"wrap"}}>
            <Ring value={saved} max={b.savingsGoal} size={96} color="var(--gold)" label={`${savePct}%`} sub="saved"/>
            <div style={{flex:1}}><div style={{fontSize:17,fontWeight:700,marginBottom:4}}>{savePct>=100?"Goal hit! 🎉":savePct>=50?"Halfway there! 💪":"Building momentum ✨"}</div><div style={{fontSize:12.5,color:"var(--text-muted)",marginBottom:10}}>${saved.toFixed(0)} of ${b.savingsGoal.toLocaleString()} goal</div><div className="xb" style={{height:8}}><div className="xf" style={{width:`${Math.min((saved/b.savingsGoal)*100,100)}%`}}/></div></div>
          </div>
          <div className="card">
            <div style={{fontWeight:700,fontSize:13.5,marginBottom:14}}>5-Month Trend</div>
            <div style={{display:"flex",gap:6,height:90,alignItems:"flex-end"}}>
              {b.monthlyData.map((m,i)=>{const max=Math.max(...b.monthlyData.map(x=>x.income));return(
                <div key={m.month} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div style={{width:"100%",position:"relative",height:(m.income/max)*70}}>
                    <div style={{position:"absolute",bottom:0,left:0,right:0,height:(m.income/max)*70,background:"rgba(127,255,212,0.3)",borderRadius:"4px 4px 0 0"}}/>
                    <div style={{position:"absolute",bottom:0,left:0,right:0,height:(m.spent/max)*70,background:"rgba(255,107,157,0.5)",borderRadius:"4px 4px 0 0"}}/>
                  </div>
                  <span style={{fontSize:10,color:"var(--text-dim)"}}>{m.month}</span>
                </div>
              );})}
            </div>
            <div style={{display:"flex",gap:12,marginTop:8,fontSize:11}}><span style={{display:"flex",alignItems:"center",gap:4,color:"var(--text-muted)"}}><span style={{width:8,height:8,borderRadius:2,background:"rgba(127,255,212,0.5)",display:"inline-block"}}/>Income</span><span style={{display:"flex",alignItems:"center",gap:4,color:"var(--text-muted)"}}><span style={{width:8,height:8,borderRadius:2,background:"rgba(255,107,157,0.5)",display:"inline-block"}}/>Spent</span></div>
          </div>
          <div className="card">
            <div className="flex fac fjb" style={{marginBottom:13}}><span style={{fontWeight:700,fontSize:13.5}}>Top Categories</span><button className="btn btn-g btn-sm" onClick={()=>setTab("transactions")}>All →</button></div>
            {[...computedCats].sort((a,b)=>b.spent-a.spent).slice(0,4).map(cat=>(
              <div key={cat.id} style={{marginBottom:13}}>
                <div className="flex fac fjb" style={{marginBottom:5}}><span className="flex fac gap2" style={{fontSize:13,fontWeight:600}}>{cat.emoji} {cat.name}{cat.spent>cat.budget&&<span className="b br" style={{fontSize:9.5}}>Over!</span>}</span><span style={{fontSize:11.5,color:cat.spent>cat.budget?"var(--rose)":"var(--text-muted)"}}>${cat.spent.toFixed(0)} / ${cat.budget}</span></div>
                <div className="pb"><div className="pf" style={{width:`${Math.min((cat.spent/cat.budget)*100,100)}%`,background:cat.spent>cat.budget?"var(--rose)":cat.color}}/></div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="transactions"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{allCats.map(cat=><button key={cat} onClick={()=>setFilterCat(cat)} className={`btn btn-sm ${filterCat===cat?"btn-s":"btn-g"}`} style={{fontSize:11}}>{cat}</button>)}</div>
          <div style={{fontSize:12,color:"var(--text-muted)"}}>{filteredTx.length} transactions · <span style={{color:"var(--rose)"}}>-${filteredTx.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0).toFixed(2)}</span> · <span style={{color:"var(--mint)"}}>+${filteredTx.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0).toFixed(2)}</span></div>
          <div className="card" style={{padding:0,overflow:"hidden"}}>
            {filteredTx.length===0&&<div style={{padding:36,textAlign:"center",color:"var(--text-muted)",fontSize:13}}>No transactions</div>}
            {filteredTx.map((tx,idx)=>(
              <div key={tx.id} className="flex fac gap3" style={{padding:"13px 17px",borderBottom:idx<filteredTx.length-1?"1px solid var(--border)":"none",cursor:"default"}} onMouseEnter={e=>e.currentTarget.style.background="var(--surface2)"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                <div style={{width:38,height:38,borderRadius:11,background:tx.amount>0?"rgba(127,255,212,0.1)":"var(--surface2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0}}>{tx.emoji}</div>
                <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:13}}>{tx.name}</div><div style={{fontSize:10.5,color:"var(--text-muted)",display:"flex",gap:7,marginTop:2,flexWrap:"wrap"}}><span>{tx.date}</span><span className={`b ${tx.amount>0?"bm":"bi"}`} style={{fontSize:9.5}}>{tx.category}</span>{tx.note&&<span style={{color:"var(--text-dim)",fontStyle:"italic"}}>{tx.note}</span>}</div></div>
                <span style={{fontWeight:700,fontSize:15,color:tx.amount>0?"var(--mint)":"var(--rose)",flexShrink:0}}>{tx.amount>0?"+":"-"}${Math.abs(tx.amount).toFixed(2)}</span>
                <button className="btn btn-g btn-ic" style={{width:26,height:26,fontSize:15,color:"var(--text-dim)",flexShrink:0}} onClick={()=>delTx(tx.id)}>×</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="budgets"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{fontSize:12.5,color:"var(--text-muted)"}}>Budgeted: <strong style={{color:"var(--text)"}}>${computedCats.reduce((s,c)=>s+c.budget,0).toLocaleString()}</strong> · Spent: <strong style={{color:"var(--rose)"}}>${totalSpent.toFixed(0)}</strong></div>
          {computedCats.map(cat=>{const pct=Math.min((cat.spent/cat.budget)*100,100),over=cat.spent>cat.budget,rem=cat.budget-cat.spent;return(
            <div key={cat.id} className="card" style={{borderLeft:`3px solid ${over?"var(--rose)":cat.color}`}}>
              <div className="flex fac fjb" style={{marginBottom:10}}>
                <div className="flex fac gap2"><span style={{fontSize:21}}>{cat.emoji}</span><div><div style={{fontWeight:700,fontSize:13.5}}>{cat.name}</div><div style={{fontSize:11,color:over?"var(--rose)":"var(--mint)"}}>{over?`Over by $${Math.abs(rem).toFixed(0)}`:`$${rem.toFixed(0)} remaining`}</div></div></div>
                <div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:16,color:over?"var(--rose)":"var(--text)"}}>${cat.spent.toFixed(0)}</div><div style={{fontSize:10.5,color:"var(--text-dim)"}}>/ ${cat.budget}</div></div>
              </div>
              <div className="pb" style={{height:7}}><div className="pf" style={{width:`${pct}%`,background:over?"var(--rose)":cat.color,height:7}}/></div>
            </div>
          );})}
        </div>
      )}

      {tab==="bills"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div className="flex fac fjb">
            <div><div style={{fontSize:13,color:"var(--text-muted)"}}>Monthly: <strong style={{color:"var(--text)"}}>${b.bills.reduce((s,bl)=>s+bl.amount,0).toFixed(0)}</strong></div><div style={{fontSize:12,color:"var(--text-muted)",marginTop:2}}>Annual: <strong style={{color:"var(--text)"}}>${(b.bills.reduce((s,bl)=>s+bl.amount,0)*12).toLocaleString()}</strong></div></div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {b.bills.map(bl=>(
              <div key={bl.id} className="card flex fac gap3">
                <div style={{width:42,height:42,borderRadius:12,background:bl.paid?"rgba(127,255,212,0.12)":"var(--surface2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{bl.emoji}</div>
                <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13.5}}>{bl.name}</div><div style={{fontSize:11,color:"var(--text-muted)"}}>Due: {bl.dueDay}th{bl.autoPay?" · AutoPay ✓":""}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:15}}>${bl.amount}</div><div style={{fontSize:11,color:"var(--text-dim)"}}>monthly</div></div>
                <button className={`btn btn-sm ${bl.paid?"btn-s":"btn-p"}`} onClick={()=>toggleBillPaid(bl.id)} style={{flexShrink:0,fontSize:11}}>{bl.paid?"Paid ✓":"Mark Paid"}</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="networth"&&(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div className="card gg"><div style={{fontSize:13,color:"var(--text-muted)",marginBottom:4}}>Total Net Worth</div><div style={{fontSize:32,fontWeight:800,color:"var(--gold)"}}>${networth.toLocaleString()}</div><div style={{fontSize:12.5,color:"var(--text-muted)",marginTop:4}}>Assets <strong style={{color:"var(--mint)"}}>+${b.assets.reduce((s,a)=>s+a.amount,0).toLocaleString()}</strong> · Liabilities <strong style={{color:"var(--rose)"}}>-${b.liabilities.reduce((s,l)=>s+l.amount,0).toLocaleString()}</strong></div></div>
          <div className="card">
            <div style={{fontWeight:700,fontSize:13.5,marginBottom:13}}>Assets</div>
            {b.assets.map(a=><div key={a.id} className="flex fac fjb" style={{padding:"10px 0",borderBottom:"1px solid var(--border)"}}><div className="flex fac gap2"><span style={{fontSize:18}}>{a.emoji}</span><span style={{fontSize:13,fontWeight:600}}>{a.name}</span></div><span style={{fontWeight:700,color:"var(--mint)"}}>${a.amount.toLocaleString()}</span></div>)}
            <div className="flex fac fjb" style={{paddingTop:10,fontWeight:700}}><span>Total</span><span style={{color:"var(--mint)"}}>${b.assets.reduce((s,a)=>s+a.amount,0).toLocaleString()}</span></div>
          </div>
          <div className="card">
            <div style={{fontWeight:700,fontSize:13.5,marginBottom:13}}>Liabilities</div>
            {b.liabilities.map(l=><div key={l.id} className="flex fac fjb" style={{padding:"10px 0",borderBottom:"1px solid var(--border)"}}><div className="flex fac gap2"><span style={{fontSize:18}}>{l.emoji}</span><span style={{fontSize:13,fontWeight:600}}>{l.name}</span></div><span style={{fontWeight:700,color:"var(--rose)"}}>-${l.amount.toLocaleString()}</span></div>)}
            <div className="flex fac fjb" style={{paddingTop:10,fontWeight:700}}><span>Total</span><span style={{color:"var(--rose)"}}>-${b.liabilities.reduce((s,l)=>s+l.amount,0).toLocaleString()}</span></div>
          </div>
        </div>
      )}

      <Modal open={showAddTx} onClose={()=>setShowAddTx(false)} title="Add Transaction">
        <div className="tabs" style={{marginBottom:14}}>
          <div className={`tab ${nt.type==="expense"?"active":""}`} onClick={()=>setNt(t=>({...t,type:"expense",emoji:"💸"}))}>💸 Expense</div>
          <div className={`tab ${nt.type==="income"?"active":""}`} onClick={()=>setNt(t=>({...t,type:"income",emoji:"💵"}))}>💵 Income</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <div style={{display:"flex",gap:9}}>
            <Field label="Emoji" style={{width:58}}><input className="inp" value={nt.emoji} onChange={e=>setNt(t=>({...t,emoji:e.target.value}))} style={{textAlign:"center",fontSize:20,padding:"8px 4px"}}/></Field>
            <Field label="Description" style={{flex:1}}><input className="inp" placeholder="Trader Joe's" value={nt.name} onChange={e=>setNt(t=>({...t,name:e.target.value}))}/></Field>
          </div>
          <div className="g2">
            <Field label="Amount ($)"><input className="inp" type="number" step="0.01" placeholder="0.00" value={nt.amount} onChange={e=>setNt(t=>({...t,amount:e.target.value}))}/></Field>
            {nt.type==="expense"&&<Field label="Category"><select className="inp" value={nt.category} onChange={e=>setNt(t=>({...t,category:e.target.value}))}>{b.categories.map(c=><option key={c.id}>{c.name}</option>)}</select></Field>}
          </div>
          <Field label="Note"><input className="inp" placeholder="Optional note" value={nt.note} onChange={e=>setNt(t=>({...t,note:e.target.value}))}/></Field>
        </div>
        <div style={{display:"flex",gap:9,marginTop:18}}><button className="btn btn-g w100" onClick={()=>setShowAddTx(false)}>Cancel</button><button className="btn btn-p w100" onClick={addTx}>Add</button></div>
      </Modal>

      <Modal open={showAddBill} onClose={()=>setShowAddBill(false)} title="Add Bill 📄">
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <div style={{display:"flex",gap:9}}>
            <Field label="Emoji" style={{width:58}}><input className="inp" value={nb.emoji} onChange={e=>setNb(b=>({...b,emoji:e.target.value}))} style={{textAlign:"center",fontSize:20,padding:"8px 4px"}}/></Field>
            <Field label="Bill Name" style={{flex:1}}><input className="inp" placeholder="Electric" value={nb.name} onChange={e=>setNb(b=>({...b,name:e.target.value}))}/></Field>
          </div>
          <div className="g2">
            <Field label="Amount ($)"><input className="inp" type="number" placeholder="85" value={nb.amount} onChange={e=>setNb(b=>({...b,amount:e.target.value}))}/></Field>
            <Field label="Due Day"><input className="inp" type="number" min="1" max="31" placeholder="15" value={nb.dueDay} onChange={e=>setNb(b=>({...b,dueDay:e.target.value}))}/></Field>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}><input type="checkbox" checked={nb.autoPay} onChange={e=>setNb(b=>({...b,autoPay:e.target.checked}))} style={{accentColor:"var(--violet)",width:16,height:16}}/><label style={{fontSize:13}}>AutoPay</label></div>
        </div>
        <div style={{display:"flex",gap:9,marginTop:18}}><button className="btn btn-g w100" onClick={()=>setShowAddBill(false)}>Cancel</button><button className="btn btn-p w100" onClick={addBill}>Add Bill</button></div>
      </Modal>
    </div>
  );
}

function GoalsPage({data,setData,toast}){
  const [showAdd,setShowAdd]=useState(false);
  const [ng,setNg]=useState({name:"",category:"Custom",current:"",target:"",unit:"",deadline:"",emoji:"🎯",color:"var(--violet)",reverse:false});
  const add=()=>{
    if(!ng.name.trim()||!ng.target)return;
    setData(d=>({...d,goals:[...d.goals,{id:Date.now(),...ng,current:+ng.current||0,target:+ng.target}]}));
    toast("New goal added! 🎯");setShowAdd(false);setNg({name:"",category:"Custom",current:"",target:"",unit:"",deadline:"",emoji:"🎯",color:"var(--violet)",reverse:false});
  };
  return(
    <div className="pe">
      <div className="flex fac fjb sh">
        <div><h2 className="st">Goals 🎯</h2><p className="ss2">{data.goals.length} active goals</p></div>
        <button className="btn btn-p" onClick={()=>setShowAdd(true)}><Ic n="plus" size={15} color="#fff"/>New Goal</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {data.goals.map(g=>{
          const pct=g.reverse?Math.min(100,Math.round(((g.target*2-g.current)/(g.target))*100)):Math.min(100,Math.round((g.current/g.target)*100));
          const days=DAYS_LEFT(g.deadline),done=pct>=100;
          return(
            <div key={g.id} className="card" style={{borderLeft:`3px solid ${g.color}`}}>
              <div className="flex fac gap3" style={{flexWrap:"wrap"}}>
                <span style={{fontSize:28}}>{g.emoji}</span>
                <div style={{flex:1}}>
                  <div className="flex fac fjb" style={{flexWrap:"wrap",gap:6}}>
                    <div style={{fontWeight:700,fontSize:15}}>{g.name}</div>
                    <div className="flex fac gap2"><span className="b" style={{background:`${g.color}1a`,color:g.color,fontSize:10}}>{g.category}</span>{done&&<span className="b bm">Done! 🎉</span>}</div>
                  </div>
                  <div style={{fontSize:12.5,color:"var(--text-muted)",margin:"5px 0 10px"}}>Current: <strong style={{color:"var(--text)"}}>{g.current} {g.unit}</strong> → Target: <strong style={{color:g.color}}>{g.target} {g.unit}</strong></div>
                  <div className="pb" style={{marginBottom:6}}><div className="pf" style={{width:`${pct}%`,background:g.color}}/></div>
                  <div className="flex fac fjb" style={{fontSize:11,color:"var(--text-dim)"}}>
                    <span>{pct}% complete</span>
                    {days!==null&&<span>⏰ {days}d left</span>}
                  </div>
                  <div className="flex fac gap2" style={{marginTop:10}}>
                    <input className="inp" type="number" step="0.1" placeholder="Update progress..." style={{maxWidth:160,fontSize:12}} onBlur={e=>{if(e.target.value){setData(d=>({...d,goals:d.goals.map(x=>x.id===g.id?{...x,current:+e.target.value}:x)}));e.target.value="";}}} onKeyDown={e=>{if(e.key==="Enter"&&e.target.value){setData(d=>({...d,goals:d.goals.map(x=>x.id===g.id?{...x,current:+e.target.value}:x)}));e.target.value="";}}}/>
                    <button className="btn btn-g btn-sm" style={{fontSize:12,color:"var(--text-dim)"}} onClick={()=>setData(d=>({...d,goals:d.goals.filter(x=>x.id!==g.id)}))}>Remove</button>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <Modal open={showAdd} onClose={()=>setShowAdd(false)} title="New Goal 🎯">
        <div style={{display:"flex",flexDirection:"column",gap:11}}>
          <div style={{display:"flex",gap:9}}>
            <Field label="Emoji" style={{width:58}}><input className="inp" value={ng.emoji} onChange={e=>setNg(g=>({...g,emoji:e.target.value}))} style={{textAlign:"center",fontSize:20,padding:"8px 4px"}}/></Field>
            <Field label="Goal Name" style={{flex:1}}><input className="inp" placeholder="Run 5K under 25min" value={ng.name} onChange={e=>setNg(g=>({...g,name:e.target.value}))}/></Field>
          </div>
          <div className="g2">

function AICoachPage({data,setData,toast}){
  const [input,setInput]=useState(""),[loading,setLoading]=useState(false);
  const endRef=useRef(null),inputRef=useRef(null);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),[data.messages]);
  const avgSleep=(data.sleep.logs.slice(0,7).reduce((s,l)=>s+l.hours,0)/Math.min(data.sleep.logs.length,7)).toFixed(1);
  const cycle=getCyclePhase(data.cycle.lastPeriodStart,data.cycle.cycleLength);
  const recentMoods=data.journal.entries.slice(0,5).map(e=>`${e.date}: ${e.moodScore}/10`).join(", ");
  const computedCats=data.budget.categories.map(c=>({...c,spent:+catSpent(data.budget.transactions,c.name).toFixed(2)}));
  const overBudget=computedCats.filter(c=>c.spent>c.budget).map(c=>c.name).join(", ")||"none";
  const system=`You are Luna, a warm empowering AI wellness coach in LifeSync for ${data.user.name}.
DATA: Level ${calcLevel(data.user.xp).level}, ${data.user.xp} XP. Streaks: habits ${data.streaks.habits}d, workouts ${data.streaks.workouts}d, journaling ${data.streaks.logging}d. Today: ${data.habits.filter(h=>h.doneToday).length}/${data.habits.length} habits. Calories: ${data.nutrition.calories.current}/${data.settings.calorieGoal}. Water: ${data.nutrition.water.current}/${data.settings.waterGoal} cups. Avg sleep: ${avgSleep}h (goal ${data.sleep.goalHours}h). Cycle phase: ${cycle.phase} day ${cycle.day}. Recent moods: ${recentMoods}. Over budget: ${overBudget}.
Be warm, brief (2-4 sentences), 1-2 emojis, specific and data-driven.`;
  const send=async()=>{
    if(!input.trim()||loading)return;
    const msg=input.trim();setInput("");
    setData(d=>({...d,messages:[...d.messages,{role:"user",content:msg}]}));
    setLoading(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[...data.messages.slice(-10).map(m=>({role:m.role==="ai"?"assistant":"user",content:m.content})),{role:"user",content:msg}]})});
      const d=await res.json();
      const text=d.content?.[0]?.text||"I'm here to help! Ask me anything about your wellness journey ✨";
      setData(d=>({...d,messages:[...d.messages,{role:"ai",content:text}]}));
    }catch{setData(d=>({...d,messages:[...d.messages,{role:"ai",content:"Having trouble connecting. Try again in a moment! ✨"}]}));}
    setLoading(false);
  };
  const suggestions=["What should I focus on today?","Analyze my week","Help me hit my protein goal","Plan a workout","How's my budget?","Tips for my cycle phase?"];
  return(
    <div className="pe" style={{display:"flex",flexDirection:"column",height:"calc(100vh - 110px)"}}>
      <div className="sh"><h2 className="st">AI Coach ✨</h2><p className="ss2">Luna knows your full health data · Powered by Claude</p></div>
      <div className="card" style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:13,padding:"4px 0",marginBottom:4}}>
          {data.messages.map((m,i)=>(
            <div key={i} style={{display:"flex",gap:9,alignItems:"flex-end",flexDirection:m.role==="user"?"row-reverse":"row"}}>
              {m.role==="ai"&&<div style={{width:30,height:30,borderRadius:"50%",background:"var(--grad-violet)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>✨</div>}
              <div className={`cb ${m.role==="ai"?"ai":"user"}`}>{m.content}</div>
            </div>
          ))}
          {loading&&<div style={{display:"flex",gap:9,alignItems:"flex-end"}}><div style={{width:30,height:30,borderRadius:"50%",background:"var(--grad-violet)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>✨</div><div className="cb ai loading" style={{width:70,height:34}}><span style={{letterSpacing:4}}>···</span></div></div>}
          <div ref={endRef}/>
        </div>
        {data.messages.length<3&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:11}}>{suggestions.map(s=><button key={s} className="btn btn-s btn-sm" style={{fontSize:11}} onClick={()=>{setInput(s);inputRef.current?.focus();}}>{s}</button>)}</div>}
        <div style={{display:"flex",gap:9}}>
          <input ref={inputRef} className="inp" placeholder="Ask Luna anything about your health, goals, or life…" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}/>
          <button className="btn btn-p btn-ic" onClick={send} disabled={loading||!input.trim()}><Ic n="send" size={15} color="#fff"/></button>
        </div>
      </div>
    </div>
  );
}

    if(!q.trim())return[];
    const ql=q.toLowerCase(),r=[];
    data.habits.forEach(h=>{if(h.name.toLowerCase().includes(ql))r.push({type:"Habit",emoji:h.icon,title:h.name,sub:`🔥 ${h.streak}d streak`,page:"habits"});});
    data.fitness.workouts.forEach(w=>{if(w.name.toLowerCase().includes(ql))r.push({type:"Workout",emoji:w.emoji,title:w.name,sub:`${w.date} · ${w.duration}min`,page:"fitness"});});
    data.nutrition.logs.forEach(l=>{if(l.name.toLowerCase().includes(ql))r.push({type:"Food",emoji:l.emoji,title:l.name,sub:`${l.cal} kcal`,page:"nutrition"});});
    data.budget.transactions.forEach(t=>{if(t.name.toLowerCase().includes(ql))r.push({type:"Transaction",emoji:t.emoji,title:t.name,sub:`${t.date} · ${t.amount>0?"+":"-"}$${Math.abs(t.amount).toFixed(2)}`,page:"budget"});});
    data.goals.forEach(g=>{if(g.name.toLowerCase().includes(ql))r.push({type:"Goal",emoji:g.emoji,title:g.name,sub:`${Math.min(100,Math.round((g.current/g.target)*100))}%`,page:"goals"});});
    data.journal.entries.forEach(e=>{if(e.text?.toLowerCase().includes(ql))r.push({type:"Journal",emoji:e.mood,title:e.date+" entry",sub:(e.text||"").slice(0,50)+"…",page:"journal"});});
    return r.slice(0,12);
  },[q,data]);
  return(
    <div className="search-bar">
      <Ic n="search" size={18} color="var(--text-muted)"/>
      <input ref={inputRef} style={{flex:1,background:"transparent",border:"none",outline:"none",color:"var(--text)",fontFamily:"'Sora',sans-serif",fontSize:15}} placeholder="Search habits, workouts, food, transactions, goals…" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Escape"&&onClose()}/>
      <button className="btn btn-g btn-sm" onClick={onClose}>ESC</button>
      {results.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"var(--surface)",border:"1px solid var(--border-bright)",borderTop:"none",borderRadius:"0 0 16px 16px",boxShadow:"0 8px 30px rgba(0,0,0,0.4)",overflow:"hidden",zIndex:9999}}>
          {results.map((r,i)=>(
            <div key={i} style={{display:"flex",gap:12,padding:"12px 20px",cursor:"pointer",borderBottom:"1px solid var(--border)"}} onClick={()=>{onNavigate(r.page);onClose();}} onMouseEnter={e=>e.currentTarget.style.background="var(--surface2)"} onMouseLeave={e=>e.currentTarget.style.background=""}>
              <span style={{fontSize:19,flexShrink:0}}>{r.emoji}</span>
              <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{r.title}</div><div style={{fontSize:11,color:"var(--text-muted)"}}>{r.type} · {r.sub}</div></div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ══ SUPABASE ═════════════════════════════════════════════════════════════════
const SB_URL="https://zjaevznmthrpvhbpdjuj.supabase.co";
const SB_KEY="sb_publishable_5NwcvTweidtsFG4yhUj8Lw_exLp5Rbm";
const SB_HDR={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`};
const SB_UID="lifesync-user-1";

async function sbLoad(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/lifesync?user_id=eq.${SB_UID}&select=data`,{headers:SB_HDR});
    if(!r.ok)return null;
    const rows=await r.json();
    return rows?.[0]?.data||null;
  }catch{return null;}
}

async function sbSave(d){
  try{
    await fetch(`${SB_URL}/rest/v1/lifesync`,{
      method:"POST",
      headers:{...SB_HDR,"Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify({user_id:SB_UID,data:d,updated_at:new Date().toISOString()}),
    });
  }catch{}
}

export default function App(){
  const [data,setData]=useState(()=>{
    try{const s=localStorage.getItem("lifesync-v6");return s?JSON.parse(s):makeData();}
    catch{return makeData();}
  });
  const [dbReady,setDbReady]=useState(false);
  const [saveStatus,setSaveStatus]=useState("saved"); // "saved" | "saving" | "error"
  const saveTimer=useRef(null);

  // On first load — pull from Supabase, merge with localStorage
  useEffect(()=>{
    sbLoad().then(remote=>{
      if(remote){
        setData(local=>{
          const remoteTs=new Date(remote?.user?.lastSaved||0).getTime();
          const localTs=new Date(local?.user?.lastSaved||0).getTime();
          return remoteTs>localTs?remote:local;
        });
      }
      setDbReady(true);
    });
  },[]);

  // Save to localStorage instantly + Supabase debounced every 3s
  useEffect(()=>{
    try{localStorage.setItem("lifesync-v6",JSON.stringify(data));}catch{}
    setSaveStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      try{
        await sbSave(data);
        setSaveStatus("saved");
      }catch{setSaveStatus("error");}
    },3000);
  },[data]);

  const [page,setPage]=useState("dashboard");
  const [expanded,setExpanded]=useState(false);
  const [searchOpen,setSearchOpen]=useState(false);
  const {toasts,toast}=useToast();

  // Background Zepp sync
  useZeppSync(setData,toast);

  // PWA: service worker, install prompt, notifications
  const{installed,installPrompt,notifStatus,requestNotifs,install}=usePWA(data,toast);

  useEffect(()=>{
    const h=e=>{
      if(e.key==="/"&&!["INPUT","TEXTAREA"].includes(document.activeElement?.tagName)){e.preventDefault();setSearchOpen(true);return;}

      if(sc[e.key]&&!["INPUT","TEXTAREA"].includes(document.activeElement?.tagName))setPage(sc[e.key]);
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[]);

  const setDataStamped=useCallback(updater=>{
    setData(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      return{...next,user:{...next.user,lastSaved:new Date().toISOString()}};
    });
  },[]);
  const props={data,setData:setDataStamped,toast,setPage};
  const pages={
    dashboard:<DashPage {...props}/>,habits:<HabitsPage {...props}/>,nutrition:<NutritionPage {...props}/>,
    fitness:<FitnessPage {...props}/>,skincare:<SkincarePage {...props}/>,sleep:<SleepPage {...props}/>,
    body:<BodyPage {...props}/>,cycle:<CyclePage {...props}/>,journal:<JournalPage {...props}/>,
    budget:<BudgetPage {...props}/>,goals:<GoalsPage {...props}/>,progress:<ProgressPage data={data}/>,
    checkin:<CheckInPage {...props}/>,ai:<AICoachPage {...props}/>,settings:<SettingsPage {...props} installed={installed} installPrompt={installPrompt} install={install} notifStatus={notifStatus} requestNotifs={requestNotifs}/>,
  };

  return(
    <>
      <style>{CSS}</style>
      <div className="orb orb1"/><div className="orb orb2"/><div className="orb orb3"/>
      {/* PWA install banner */}
      {installPrompt&&!installed&&(
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:3000,
          background:"linear-gradient(135deg,rgba(199,125,255,0.95),rgba(255,107,157,0.95))",
          backdropFilter:"blur(12px)",padding:"11px 20px",
          display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <span style={{fontSize:18}}>🌸</span>
          <span style={{flex:1,fontSize:13,fontWeight:600,color:"#fff"}}>Add LifeSync to your home screen for the full app experience</span>
          <button onClick={install} style={{background:"#fff",color:"var(--violet)",border:"none",borderRadius:9,padding:"7px 16px",fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:12.5,cursor:"pointer"}}>Install</button>
          <button onClick={()=>setInstallPrompt(null)} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.7)",fontSize:18,cursor:"pointer",padding:"0 4px"}}>×</button>
        </div>
      )}
      {searchOpen&&<GlobalSearch data={data} onNavigate={setPage} onClose={()=>setSearchOpen(false)}/>}
      <div className="app">
        <aside className={`sidebar ${expanded?"ex":""}`} onMouseEnter={()=>setExpanded(true)} onMouseLeave={()=>setExpanded(false)}>
          <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:10}}>
            <div className="s-logo" onClick={()=>setPage("dashboard")}>🌸</div>
            {expanded&&<span className="s-logo-text">LifeSync</span>}
            {expanded&&<span style={{marginLeft:"auto",fontSize:10,fontWeight:700,color:saveStatus==="saved"?"var(--mint)":saveStatus==="saving"?"var(--gold)":"var(--rose)"}} title={saveStatus==="saved"?"Saved to cloud":saveStatus==="saving"?"Saving…":"Save error"}>
              {saveStatus==="saved"?"●":"○"}

          </div>
          <div className="ni" onClick={()=>setSearchOpen(true)} title="Search (/)">

            {expanded&&<kbd style={{marginLeft:"auto",fontSize:10,color:"var(--text-dim)",fontFamily:"monospace",background:"var(--surface2)",padding:"1px 5px",borderRadius:4}}>/</kbd>}
          </div>
          <div className="sdiv"/>
          {NAV.slice(0,3).map(item=><div key={item.id} className={`ni ${page===item.id?"active":""}`} onClick={()=>setPage(item.id)} title={item.label}><Ic n={item.icon} size={17}/><span className="nl">{item.label}</span></div>)}
          <div className="sdiv"/>
          {NAV.slice(3,9).map(item=><div key={item.id} className={`ni ${page===item.id?"active":""}`} onClick={()=>setPage(item.id)} title={item.label}><Ic n={item.icon} size={17}/><span className="nl">{item.label}</span></div>)}
          <div className="sdiv"/>
          {NAV.slice(9).map(item=>(

        </aside>

        <nav className="mob-nav">
          {MOBILE_NAV.map(id=>{const item=NAV.find(n=>n.id===id);return(
            <div key={id} className={`mob-ni ${page===id?"active":""}`} onClick={()=>setPage(id)}>

        </nav>
      </div>
      <Toasts toasts={toasts}/>

  );
}
